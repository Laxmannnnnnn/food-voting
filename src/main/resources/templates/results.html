<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Results - Food Voting</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <a class="brand" href="/" aria-label="Food Voting home">
        <span class="brand-mark">FV</span>
        <span>Food Voting</span>
    </a>
    <nav aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/results">Results</a>
        <a href="/food/new">Add Food</a>
        <a href="/admin" class="btn btn-quiet" style="min-height:auto; padding: 0.35rem 0.75rem; font-size: 0.88rem; margin-left: 0.5rem;">Admin</a>
    </nav>
</header>

<main class="container">
    <section class="page-intro compact">
        <p class="eyebrow">Live leaderboard</p>
        <h1>Voting Results</h1>
        <p>The dishes with the highest average score rise to the top.</p>
    </section>

    <section th:if="${#lists.isEmpty(results)}" class="empty-state">
        <h2>No votes yet</h2>
        <p>Go back to the home page and cast your vote.</p>
        <a href="/" class="btn btn-primary">Back to Home</a>
    </section>

    <section th:unless="${#lists.isEmpty(results)}" class="results-list" aria-label="Ranked voting results">
        <article class="result-card" th:each="result, iter : ${results}">
            <div class="rank" th:classappend="${iter.index == 0 ? 'first-place' : (iter.index == 1 ? 'second-place' : (iter.index == 2 ? 'third-place' : ''))}" th:text="${iter.index + 1}">1</div>
            <div class="info">
                <h2 th:text="${result.foodItemName}">Food Name</h2>
                <div class="meter" aria-hidden="true">
                    <span th:style="|width:${result.avgRating * 20}%|"></span>
                </div>
            </div>
            <div class="stats">
                <div class="rating" th:text="${result.avgRating}">0.0</div>
                <div class="count" th:text="'(' + ${result.voteCount} + ' vote' + (${result.voteCount} != 1 ? 's' : '') + ')'">(0 votes)</div>
            </div>
        </article>
    </section>

    <div class="center-actions" th:unless="${#lists.isEmpty(results)}">
        <a href="/" class="btn btn-primary">Back to Home</a>
    </div>
</main>

<footer>
    <p>Food Voting App</p>
</footer>
</body>
</html>
